<body>

<!-- NAVBAR -->
<nav class="glass-nav">
  <div class="nav-container">

    <a href="index.html" class="logo">
      <i class="fas fa-hand-paper"></i>
      <span>SmartGloves Pro</span>
    </a>

    <div class="main-nav" id="mainNav">
      <a class="nav-btn" href="index.html"><i class="fas fa-house"></i><span>Home</span></a>
      <a class="nav-btn" href="products.html"><i class="fas fa-box-open"></i><span>Products</span></a>
      <a class="nav-btn" href="subscription.html"><i class="fas fa-crown"></i><span>Premium</span></a>
      <a class="nav-btn" href="business-collaboration.html"><i class="fas fa-briefcase"></i><span>Business</span></a>
      <a class="nav-btn" href="about.html"><i class="fas fa-circle-info"></i><span>About</span></a>
      <a class="nav-btn" href="contact.html"><i class="fas fa-envelope"></i><span>Contact</span></a>
    </div>

    <div class="nav-actions">
      <a href="products.html" class="cart-btn">
        <i class="fas fa-shopping-cart"></i>

      </a>
      <a href="subscription.html" class="user-btn">

    </div>

    <button class="mobile-toggle" id="menuToggle">

    </button>

<div class="page-hero">

</div>

        <div class="product-category">Smart Safety Gear</div>
        <h3 class="product-title">Smart Haptic Feedback Glove</h3>

        <div class="product-price">₹X,XXX</div>

        <button class="cta-button" style="width:100%;">

        </button>
      </div>
    </div>

<footer class="footer-bottom">
  <p>© 2026 SmartGloves Pro</p>
</footer>
